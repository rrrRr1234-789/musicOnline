{% extends "base.html" %}
{% block title %}Delete Vinyl | musicOnline.com{% endblock %}
{% block content %}
  <section class="form-panel">
    <h1>Delete Vinyl Confirmation</h1>
    <p>Delete {{ vinyl.artist }} - {{ vinyl.album }}?</p>
    <form method="post">
      <button class="danger" type="submit">Confirm Delete</button>
      <a class="button ghost" href="{{ url_for('dashboard') }}">Cancel</a>
    </form>
  </section>
{% endblock %}
